<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="128" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1220"/>
      <stop offset="1" stop-color="#152a45"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9ee8ff"/>
      <stop offset="1" stop-color="#4ab3e8"/>
    </linearGradient>
  </defs>
  <!-- 圆角底，适配桌面/启动器 -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>
  <!-- 机翼（先画在机身下） -->
  <path fill="#2d7ab8" d="M64 56 L28 68 L64 60 L100 68 Z" opacity="0.95"/>
  <!-- 机身（向上飞的三角） -->
  <path fill="url(#hull)" d="M64 22 L48 72 L64 64 L80 72 Z"/>
  <!-- 机头高光 -->
  <path fill="#e8fbff" opacity="0.35" d="M64 28 L56 52 L64 46 L72 52 Z"/>
  <!-- 弹幕 / 尾焰 -->
  <circle cx="64" cy="84" r="4" fill="#ffcc66"/>
  <circle cx="54" cy="92" r="3" fill="#ff9933"/>
  <circle cx="74" cy="92" r="3" fill="#ff9933"/>
  <circle cx="64" cy="98" r="2.5" fill="#ff6644"/>
</svg>
