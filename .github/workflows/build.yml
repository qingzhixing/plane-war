name: Build Plane War

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.5.1"
      GODOT_BASE_URL: "https://downloads.tuxfamily.org/godotengine"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot headless
        run: |
          mkdir -p godot
          curl -L "$GODOT_BASE_URL/$GODOT_VERSION/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -o godot/headless.zip
          unzip godot/headless.zip -d godot
          mv godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot/godot
          chmod +x godot/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          curl -L "$GODOT_BASE_URL/$GODOT_VERSION/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -o templates.tpz
          mkdir -p templates
          tar -xvf templates.tpz -C templates
          cp -r templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: List project files
        run: ls -R

      - name: Export Windows build
        run: |
          mkdir -p build
          ./godot/godot --headless --path . --export-release "Windows Desktop" build/plane-war-windows.exe
          cd build
          zip plane-war-windows.zip plane-war-windows.exe

      - name: Export Android APK
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          mkdir -p build
          ./godot/godot --headless --path . --export-release "Android" build/plane-war-android.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plane-war-builds
          path: |
            build/plane-war-windows.zip
            build/plane-war-android.apk

